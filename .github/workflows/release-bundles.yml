name: Release Bundles

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-bundles:
    name: Build ${{ matrix.label }} bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            format: tar.gz
          - os: macos-latest
            label: macos
            format: tar.gz
          - os: windows-latest
            label: windows
            format: zip

    steps:
      - uses: actions/checkout@v4

      - name: Build tar.gz source bundle
        if: matrix.format == 'tar.gz'
        run: |
          mkdir -p dist
          archive_name="megido-${GITHUB_REF_NAME}-${{ matrix.label }}.tar.gz"
          git archive --format=tar --prefix="megido-${GITHUB_REF_NAME}/" HEAD | gzip -9 > "dist/${archive_name}"

      - name: Build zip source bundle
        if: matrix.format == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $archiveName = "megido-$env:GITHUB_REF_NAME-${{ matrix.label }}.zip"
          git archive --format=zip --prefix="megido-$env:GITHUB_REF_NAME/" --output "dist/$archiveName" HEAD

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: megido-${{ matrix.label }}-bundle
          path: dist/*

  publish-release:
    name: Publish GitHub Release assets
    needs: build-bundles
    runs-on: ubuntu-latest

    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: megido-*-bundle
          merge-multiple: true

      - name: Publish release bundles
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
