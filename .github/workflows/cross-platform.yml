name: Cross Platform

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-14]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Unified setup
        run: python -m megido_security.setup --non-interactive --skip-docker --skip-playwright --skip-npm --no-venv

      - name: Django check
        env:
          USE_SQLITE: "true"
        run: python manage.py check

      - name: Django migrate
        env:
          USE_SQLITE: "true"
        run: python manage.py migrate --run-syncdb --noinput

      - name: Run root tests
        env:
          USE_SQLITE: "true"
        run: python -m pytest -q test_*.py

      - name: Boot smoke test
        env:
          USE_SQLITE: "true"
        run: |
          python - <<'PY'
          import os
          import socket
          import subprocess
          import sys
          import time

          env = os.environ.copy()
          proc = subprocess.Popen([sys.executable, "manage.py", "runserver", "127.0.0.1:8765"], env=env)
          ok = False
          try:
              for _ in range(30):
                  with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
                      if s.connect_ex(("127.0.0.1", 8765)) == 0:
                          ok = True
                          break
                  time.sleep(1)
          finally:
              proc.terminate()
              proc.wait(timeout=20)

          if not ok:
              raise SystemExit("Server did not start")
          PY
