name: Bug report
description: Report a reproducible problem in Megido
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please only include authorized and sanitized target details.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Clear summary of the issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04 / macOS 15 / Windows 11
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: Python 3.11.x
    validations:
      required: true
  - type: input
    id: megido_version
    attributes:
      label: Megido version or commit
      placeholder: vX.Y.Z or commit SHA
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      render: shell
      description: Paste relevant sanitized logs
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: Add images if UI behavior is involved
